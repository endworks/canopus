services:
  canopus:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    image: ghcr.io/endworks/canopus
    ports:
      - 3000:3000
    networks:
      - canopus

  canopus-zaragoza:
    build:
      context: .
      dockerfile: apps/zaragoza/Dockerfile
    image: ghcr.io/endworks/canopus-zaragoza
    ports:
      - 8877:3000
    environment:
      MONGODB_URI: ${MONGODB_URI:-}
    networks:
      - canopus
    depends_on:
      - canopus

  canopus-zine:
    build:
      context: .
      dockerfile: apps/zine/Dockerfile
    image: ghcr.io/endworks/canopus-zine
    ports:
      - 8878:3000
    environment:
      MONGODB_URI: ${MONGODB_URI:-}
    networks:
      - canopus
    depends_on:
      - canopus

networks:
  canopus:
    driver: bridge
